name: Weekly Deep Retrain

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "weekly-retrain"
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install xlrd openpyxl rapidfuzz

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw/tennis_atp/
            data/raw/odds/
            data/cache/
          key: data-cache-v1
          restore-keys: |
            data-cache-

      - name: Run full pipeline (all data sources)
        run: |
          python -c "
          from tennis_predictor.pipeline import run_full_pipeline
          import json
          from tennis_predictor.config import PROCESSED_DIR

          results = run_full_pipeline(
              start_year=1991,
              tour_level_only=False,
              test_year=2023,
              fetch_weather=True,
              fetch_court_speed=True,
              fetch_odds=True,
              compute_intransitivity=True,
          )

          # Save stats for daily runs
          stats = results.get('best_stats', {})
          (PROCESSED_DIR / 'latest_stats.json').write_text(json.dumps(stats, indent=2))
          "

      - name: Build player lookup
        run: |
          python -c "
          from tennis_predictor.predict_live import build_player_lookup
          build_player_lookup()
          "

      - name: Generate live predictions
        run: python -m tennis_predictor.predict_live

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/raw/tennis_atp/
            data/raw/odds/
            data/cache/
          key: data-cache-${{ github.run_id }}

      - name: Save model state (for daily runs)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/processed/
            data/raw/tennis_atp/
            data/raw/odds/
            data/cache/
            data/predictions/
          key: model-state-${{ github.run_id }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.run_number }}
          path: |
            data/processed/model_*.pkl
            data/processed/guard_state*.pkl
            data/processed/latest_stats.json
            data/processed/player_lookup.json
          retention-days: 90
