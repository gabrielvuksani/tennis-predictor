name: Daily Predictions

on:
  schedule:
    # Morning: full cycle (self-learn + retrain + predict)
    - cron: '0 6 * * *'
    # Afternoon: quick refresh (predict only)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-predictions"
  cancel-in-progress: true

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install xlrd openpyxl rapidfuzz

      - name: Restore model state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/processed/
            data/raw/tennis_atp/
            data/raw/odds/
            data/cache/
            data/predictions/
          key: model-state-v1
          restore-keys: |
            model-state-

      - name: Determine run mode
        id: mode
        run: |
          # Afternoon cron (14:00) = quick mode, morning (06:00) = full
          HOUR=$(date -u +%H)
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ "$INPUT_MODE" = "quick" ] || [ "$HOUR" -ge 12 ]; then
            echo "mode=quick" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi
          echo "Running in ${{ steps.mode.outputs.mode || 'full' }} mode"

      - name: Run daily update
        env:
          QUICK_MODE: ${{ steps.mode.outputs.mode == 'quick' && '1' || '0' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/daily_update.py ${{ steps.mode.outputs.mode == 'quick' && '--quick' || '' }}

      - name: Verify predictions exist
        run: |
          PRED_COUNT=$(python -c "import json; d=json.load(open('site/predictions.json')); print(len(d.get('predictions', [])))")
          echo "Predictions generated: $PRED_COUNT"
          if [ "$PRED_COUNT" -eq 0 ]; then
            echo "::warning::No predictions generated — schedule sources may be down"
          fi

      - name: Save model state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/processed/
            data/raw/tennis_atp/
            data/raw/odds/
            data/cache/
            data/predictions/
          key: model-state-${{ github.run_id }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
