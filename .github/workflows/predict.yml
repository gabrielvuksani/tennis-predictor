name: Daily Predictions

on:
  schedule:
    # Run daily at 06:00 UTC (before European tournaments) and 14:00 UTC (before US)
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-predictions"
  cancel-in-progress: true

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Restore model state
        uses: actions/cache@v4
        with:
          path: |
            data/processed/model_*.pkl
            data/processed/guard_state*.pkl
            data/processed/matches.parquet
            data/processed/features*.parquet
            data/processed/targets*.npy
            data/processed/online_state/
            data/processed/player_lookup.json
            data/raw/tennis_atp/
            data/cache/
          key: model-state-${{ github.sha }}
          restore-keys: |
            model-state-

      - name: Run daily update
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/daily_update.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      - name: Save model state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/processed/model_*.pkl
            data/processed/guard_state*.pkl
            data/processed/matches.parquet
            data/processed/features*.parquet
            data/processed/targets*.npy
            data/processed/online_state/
            data/processed/player_lookup.json
            data/raw/tennis_atp/
            data/cache/
          key: model-state-${{ github.sha }}
